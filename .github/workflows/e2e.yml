name: E2E

on:
  push:
    branches: [main]
  pull_request:

jobs:
  playwright:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: melodix
          POSTGRES_PASSWORD: melodix
          POSTGRES_DB: melodix
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      # Smoke specs use DEMO_TRACKS (no JAMENDO_CLIENT_ID), authed specs talk
      # to a real Postgres provisioned above. The DB-backed specs are gated
      # by MELODIX_E2E_AUTHED so the same Playwright config still works
      # locally without Docker. See ADR-0018.
      JWT_SECRET: e2e-secret
      NEXT_PUBLIC_API_URL: http://localhost:4000
      DATABASE_URL: postgresql://melodix:melodix@localhost:5432/melodix?schema=public
      MELODIX_E2E_AUTHED: '1'

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.1

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @melodix/api prisma:generate

      - name: Apply Prisma schema (db push, no migration history needed for E2E)
        run: pnpm --filter @melodix/api exec prisma db push --skip-generate --accept-data-loss

      - name: Seed E2E user
        run: pnpm --filter @melodix/api prisma:seed

      - name: Build
        run: pnpm build

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install --with-deps chromium

      - name: Install Playwright system deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm exec playwright install-deps chromium

      - name: Run Playwright tests (smoke + authed)
        run: pnpm e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload Playwright traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: test-results/
          retention-days: 7
