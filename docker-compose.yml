###############################################################################
# Melodix — Docker Compose (self-hosted with Cloudflare Tunnel)
#
# Usage:
#   1. Copy .env.production.example → .env.production and fill in your values
#   2. docker compose --env-file .env.production up -d --build
#
# Storage backend (STORAGE_BACKEND env var, default `s3`):
#   - `s3`       → upload to any S3-compatible bucket (Backblaze B2, R2, …);
#                  set the S3_* vars below.
#   - `postgres` → store audio + cover blobs as `bytea` in the same Postgres
#                  database. Set API_PUBLIC_URL to the public URL of the API
#                  (the upload URLs become `${API_PUBLIC_URL}/api/storage/<key>`).
#                  See ADR-0026.
#
# Cloud database / Redis:
#   Local Postgres + Redis are enabled by default below (zero-config self-host).
#   To use a cloud provider instead (Supabase, Neon, Upstash, …), set
#   DATABASE_URL / REDIS_URL in .env.production and remove the `postgres` /
#   `redis` services below. NOTE: the postgres backend (`STORAGE_BACKEND=postgres`)
#   needs DB storage roughly equal to your audio library — most cloud free tiers
#   (Neon 0.5 GB, Supabase 0.5 GB) are too small for this; prefer local
#   Postgres or upgrade to a paid plan.
###############################################################################

services:
  # ── Infrastructure ─────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: melodix-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-melodix}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-melodix}
      POSTGRES_DB: ${POSTGRES_DB:-melodix}
    volumes:
      - melodix_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-melodix} -d ${POSTGRES_DB:-melodix}']
      interval: 5s
      timeout: 5s
      retries: 5
    # Uncomment to expose Postgres externally for debugging / migrations
    # ports:
    #   - '5432:5432'

  redis:
    image: redis:7-alpine
    container_name: melodix-redis
    restart: unless-stopped
    volumes:
      - melodix_redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5
    # Uncomment to expose Redis externally for debugging
    # ports:
    #   - '6379:6379'

  # ── API (NestJS + Prisma) ──────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: melodix-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://melodix:melodix@postgres:5432/melodix?schema=public}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JAMENDO_CLIENT_ID: ${JAMENDO_CLIENT_ID:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      # Storage backend selector: `s3` (default) or `postgres`. See ADR-0026.
      STORAGE_BACKEND: ${STORAGE_BACKEND:-s3}
      # S3-compatible storage (used when STORAGE_BACKEND=s3; defaults tuned for Backblaze B2)
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_REGION: ${S3_REGION:-auto}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
      S3_BUCKET: ${S3_BUCKET:-melodix}
      S3_PUBLIC_URL: ${S3_PUBLIC_URL:-}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-false}
      # Postgres-blob storage (used when STORAGE_BACKEND=postgres)
      API_PUBLIC_URL: ${API_PUBLIC_URL:-}
      # URL of the Aeneas forced-aligner sidecar (ADR-0030). Same docker
      # network, so the service hostname `aeneas` resolves automatically.
      AENEAS_URL: ${AENEAS_URL:-http://aeneas:8000}
      PORT: '4000'
      NODE_ENV: production
    # Uncomment to expose API externally for debugging
    # ports:
    #   - '4000:4000'

  # ── Aeneas forced-aligner sidecar ──────────────────────────────────
  # Auto-syncs plain-text lyrics to audio for the admin "Auto-sync from
  # SUNO lyrics" flow. Internal-only; never exposed publicly. See ADR-0030.
  aeneas:
    build:
      context: services/aeneas-aligner
      dockerfile: Dockerfile
    container_name: melodix-aeneas
    restart: unless-stopped
    environment:
      # Used to resolve relative `audio_url` values (postgres backend stores
      # /api/storage/<key>) without exposing the API publicly.
      API_INTERNAL_URL: ${API_INTERNAL_URL:-http://api:4000}
    # Uncomment to expose for local debugging
    # ports:
    #   - '8000:8000'

  # ── Web (Next.js main site) ────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://api:4000}
        # Build-time arg — Next.js bakes rewrite destinations into the routes
        # manifest in `output: 'standalone'` mode (ADR-0029).
        API_INTERNAL_URL: ${API_INTERNAL_URL:-http://api:4000}
    container_name: melodix-web
    restart: unless-stopped
    depends_on:
      - api
    environment:
      HOSTNAME: '0.0.0.0'
      PORT: '3000'
      # Server-side internal URL used by Next.js to proxy /api/storage/*
      # to the API container (so postgres-backend audio plays same-origin).
      API_INTERNAL_URL: ${API_INTERNAL_URL:-http://api:4000}
    # Uncomment to expose web externally for debugging
    # ports:
    #   - '3000:3000'

  # ── Mini App (Next.js Telegram Mini App) ───────────────────────────
  miniapp:
    build:
      context: .
      dockerfile: apps/miniapp/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://api:4000}
        API_INTERNAL_URL: ${API_INTERNAL_URL:-http://api:4000}
    container_name: melodix-miniapp
    restart: unless-stopped
    depends_on:
      - api
    environment:
      HOSTNAME: '0.0.0.0'
      PORT: '3001'
      API_INTERNAL_URL: ${API_INTERNAL_URL:-http://api:4000}
    # Uncomment to expose miniapp externally for debugging
    # ports:
    #   - '3001:3001'

  # ── Admin (Next.js admin dashboard) ────────────────────────────────
  admin:
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://api:4000}
        API_INTERNAL_URL: ${API_INTERNAL_URL:-http://api:4000}
    container_name: melodix-admin
    restart: unless-stopped
    depends_on:
      - api
    environment:
      HOSTNAME: '0.0.0.0'
      PORT: '3002'
      API_INTERNAL_URL: ${API_INTERNAL_URL:-http://api:4000}
    # Uncomment to expose admin externally for debugging
    # ports:
    #   - '3002:3002'

  # ── Cloudflare Tunnel ──────────────────────────────────────────────
  # Exposes your services to the internet without opening ports.
  #
  # Setup:
  #   1. Go to https://one.dash.cloudflare.com → Networks → Tunnels
  #   2. Create a tunnel, copy the tunnel token
  #   3. Add public hostnames pointing to the internal services:
  #      - melodix.yourdomain.com       → http://web:3000
  #      - api.melodix.yourdomain.com   → http://api:4000
  #      - app.melodix.yourdomain.com   → http://miniapp:3001
  #      - admin.melodix.yourdomain.com → http://admin:3002
  #   4. Set CLOUDFLARE_TUNNEL_TOKEN in .env.production
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: melodix-tunnel
    restart: unless-stopped
    command: tunnel run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN:?CLOUDFLARE_TUNNEL_TOKEN is required}
    depends_on:
      - web
      - api
      - miniapp
      - admin

volumes:
  melodix_postgres_data:
  melodix_redis_data:
